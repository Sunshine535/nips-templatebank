# Full GIFT with step-level primitives (Variant C in GPT-5.5 review)
# All mechanism switches ON: explicit bindings, call_output refs,
# active-binding gate, true-dataflow MCD, step-primitive library.

method: gift
plan_schema: dataflow_v1
require_explicit_bindings: true
require_active_binding: true
allow_call_output_refs: true
mcd_compounds: true_dataflow
fallback_policy: report_only

teacher:
  model: "Qwen/Qwen3.5-27B"
  enable_thinking: false
  max_new_tokens: 512
  samples_per_example: 1

planner:
  model: "Qwen/Qwen3.5-9B"
  enable_thinking: false
  dtype: "bf16"
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  bf16: true
  training_data: "results/gift_step/compose_train_gift.json"
  library_path: "results/gift_step/library_gift.json"
  format: "dataflow_plan"

library_config:
  source: "step_primitives"
  min_support: 3

evaluation:
  primary_metric: method_accuracy
  require_adapters: true
  no_fallback: true
  seeds: [42, 123, 456]
