# Existing Best Positive Fragment Only (Variant A in GPT-5.5 review)
# This is flat SFT on the 697 verified programs — the current strongest signal.
# Serves as the competitive baseline that full GIFT must beat.

method: flat_sft
plan_schema: none
require_explicit_bindings: false
require_active_binding: false
allow_call_output_refs: false
mcd_compounds: legacy
fallback_policy: report_only

teacher:
  model: "Qwen/Qwen3.5-27B"
  enable_thinking: false
  max_new_tokens: 512
  samples_per_example: 1

planner:
  model: "Qwen/Qwen3.5-9B"
  enable_thinking: false
  dtype: "bf16"
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05

training:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  bf16: true
  training_data: "results/templates_verified/all_programs.json"
  format: "flat_json_program"

evaluation:
  primary_metric: method_accuracy
  require_adapters: true
  no_fallback: true
  seeds: [42, 123, 456]
