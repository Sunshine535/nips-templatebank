teacher:
  model: "Qwen/Qwen3.5-32B"
  enable_thinking: false
  temperature: 0.2
  top_p: 0.95
  max_new_tokens: 768
  samples_per_example: 4
  select: "shortest_valid_executable"

planner:
  model: "Qwen/Qwen3.5-9B"
  enable_thinking: false
  dtype: "bf16"
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 2
  learning_rate: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  gradient_checkpointing: true
  dataloader_num_workers: 4
  pack: true
  report_to: "wandb"

datasets:
  gsm8k:
    dataset_id: "openai/gsm8k"
    subset: "main"
    train_split: "train"
    test_split: "test"
    max_train: 7473
    max_test: 1319
    max_seq_len: 2048
    max_new_tokens_plan: 384
    max_steps_compose: 12
    max_steps_flat: 24
    max_calls: 6
  math:
    dataset_id: "lighteval/MATH"
    train_split: "train"
    test_split: "test"
    max_train: 7500
    max_test: 5000
    max_seq_len: 3072
    max_new_tokens_plan: 640
    max_steps_compose: 20
    max_steps_flat: 40
    max_calls: 10

library:
  sizes: [4, 8, 16, 32]
  main_size: 16
  subtree_size_range: [2, 5]
  max_call_depth: 2
  no_recursion: true
  opaque_ids: true
  min_support_gsm8k: 40
  min_support_math: 25
  score: "mdl_gain"

mcd_split:
  train: 0.6
  dev: 0.2
  test: 0.2
  dev_from_train_distribution_only: true
  atoms: ["primitive_op", "arity", "type_signature"]
  compounds: ["parent_child_bigram", "sibling_bigram", "top_call_bigram", "depth_trigram"]
  max_atom_tvd: 0.02
  min_unseen_test_compounds: 0.40
  num_trials: 500

evaluation:
  methods: ["compose", "flat_inline", "cot_budget", "retrieval_compose"]
  metrics: ["accuracy", "valid_plan_rate", "execution_success", "fallback_rate",
            "fallback_free_accuracy", "total_tokens", "latency"]
  num_seeds: 3
  rerank_n: 3
  cot_budget:
    temperature: 0.6
    top_p: 0.95
    max_new_tokens_gsm8k: 256
    max_new_tokens_math: 512
    vote: "majority_numeric"
  retrieval:
    encoder: "BAAI/bge-large-en-v1.5"
    dense_weight: 0.7
    bm25_weight: 0.3
    top_k_funcs: 8
    top_k_examples: 4

ablation:
  library_sizes: [4, 8, 16, 32]
  ablations: ["no_compose", "no_types"]

output_dir: "./results"
