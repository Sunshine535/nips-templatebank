extraction:
  teacher_model: "Qwen/Qwen3.5-27B"
  student_model: "Qwen/Qwen3.5-9B"
  hf_endpoint: "https://hf-mirror.com"
  source_datasets:
    - name: "gsm8k"
      dataset_id: "openai/gsm8k"
      subset: "main"
      split: "train"
      max_samples: 7473
    - name: "math"
      dataset_id: "lighteval/MATH"
      split: "train"
      max_samples: 7500
  max_templates_per_dataset: 500
  template_min_reuse: 3
  batch_size: 8
  max_new_tokens: 1024

template_algebra:
  max_variables: 10
  max_steps: 20
  compose_max_depth: 3
  abstraction_threshold: 0.8
  specialization_beam_size: 5

compiler:
  lora:
    r: 64
    lora_alpha: 128
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 5
  learning_rate: 2.0e-4
  warmup_ratio: 0.05
  lr_scheduler_type: "cosine"
  bf16: true
  logging_steps: 10
  save_steps: 500
  max_seq_length: 2048
  gradient_checkpointing: true
  dataloader_num_workers: 4

evaluation:
  test_datasets:
    - name: "gsm8k_test"
      dataset_id: "openai/gsm8k"
      subset: "main"
      split: "test"
      max_samples: 1319
    - name: "math_test"
      dataset_id: "lighteval/MATH"
      split: "test"
      max_samples: 5000
  metrics: ["accuracy", "token_efficiency", "template_reuse_rate", "compositional_generalization"]
  max_new_tokens: 1024
  num_compositional_tests: 200

output_dir: "./outputs"
